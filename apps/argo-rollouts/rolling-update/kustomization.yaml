apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
  - ../shared/namespace.yaml
  - ../shared/serviceaccount.yaml
  - service.yaml
  - rollout.yaml

commonLabels:
  app.kubernetes.io/part-of: currency-converter
  strategy: rolling-update

images:
  - name: abdulrahman11a/currency-converter
    newTag: "IMAGE_TAG"

# ------------------------------------------------------------------
# Rolling Update is the simplest setup: one service, one rollout.
# No separate canary/stable services. No ingress traffic splitting.
# Start here when onboarding Argo Rollouts, then graduate to
# Canary or Blue-Green for production-critical workloads.
# ------------------------------------------------------------------
