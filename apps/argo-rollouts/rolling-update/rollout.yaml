apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: currency-converter
  namespace: production
  labels:
    app.kubernetes.io/name: currency-converter
    app.kubernetes.io/managed-by: argocd
    environment: production
    strategy: rolling-update
spec:
  replicas: 6
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: currency-converter
  strategy:
    canary:
      maxSurge: "25%"
      maxUnavailable: 0
      steps: []
  template:
    metadata:
      labels:
        app.kubernetes.io/name: currency-converter
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: currency-converter-sa
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: currency-converter
      containers:
        - name: currency-converter
          image: abdulrahman11a/currency-converter:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: currency-converter-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: currency-converter-secret
                  key: db-password
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: currency-converter-secret
                  key: api-key
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

# ------------------------------------------------------------------
# Rolling Update via Argo Rollouts — USE CASE
#
# Perfect for: bug fixes, config changes, dependency bumps —
# any release where mixed-version traffic is acceptable and
# you want Kubernetes-native rolling behavior with safety nets.
#
# Why Argo Rollouts over a plain Deployment?
#   Plain Deployment: rolls out blindly, no automated rollback
#   Argo Rollouts:    pause/resume control, CLI visibility,
#                     AnalysisRun support, Argo CD history
#
# maxSurge: "25%" — up to 25% extra pods during rollout
#   With 6 replicas: up to 7-8 pods running simultaneously.
#   New pods come up FIRST, pass readiness probes, then old pods stop.
#
# maxUnavailable: 0 — zero pods can be unavailable at any time
#   Combined with maxSurge: capacity never drops below 100%.
#   Safest rolling update configuration. Uses slightly more resources
#   temporarily due to the surge, but guarantees no downtime.
#
# steps: [] — empty steps = pure rolling update
#   No traffic weight control. Uses maxSurge/maxUnavailable for pacing.
#   You still get: pause/resume, rollback, Argo CD visibility.
# ------------------------------------------------------------------
