apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: currency-converter
  namespace: production
  labels:
    app.kubernetes.io/name: currency-converter
    app.kubernetes.io/managed-by: argocd
    environment: production
    strategy: blue-green
spec:
  replicas: 4
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: currency-converter
  strategy:
    blueGreen:
      activeService: currency-converter-active
      previewService: currency-converter-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 60
      prePromotionAnalysis:
        templates:
          - templateName: currency-converter-readiness
        args:
          - name: service-name
            value: currency-converter-preview
      postPromotionAnalysis:
        templates:
          - templateName: currency-converter-success-rate
        args:
          - name: service-name
            value: currency-converter-active
  template:
    metadata:
      labels:
        app.kubernetes.io/name: currency-converter
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: currency-converter-sa
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: currency-converter
      containers:
        - name: currency-converter
          image: abdulrahman11a/currency-converter:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: currency-converter-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: currency-converter-secret
                  key: db-password
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: currency-converter-secret
                  key: api-key
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

# ------------------------------------------------------------------
# Blue-Green Rollout — USE CASE
#
# Perfect for: major releases with DB migrations, breaking API changes,
# or any release where you need full QA validation before users see it.
#
# Flow:
#   1. Git push (new image tag)
#   2. Argo CD detects change → triggers Rollout
#   3. Green pods (new version) start up → go behind previewService
#   4. prePromotionAnalysis runs: curl /readyz on preview → must pass
#   5. Human (or CI) runs: kubectl argo rollouts promote currency-converter
#   6. Traffic switches instantly: activeService → Green pods
#   7. postPromotionAnalysis: monitors success rate for 10 minutes
#   8. If metrics fail → AUTO ROLLBACK to Blue
#   9. After 60s → Blue (old) pods scale down
#
# autoPromotionEnabled: false
#   Requires explicit promote command. No automatic cutover.
#   This is the production-safe setting for critical services.
#
# scaleDownDelaySeconds: 60
#   Keeps old (Blue) pods alive for 60s after promotion.
#   Instant rollback is available during this window.
# ------------------------------------------------------------------
