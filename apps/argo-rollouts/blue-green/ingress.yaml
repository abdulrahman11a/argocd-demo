apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: currency-converter-ingress
  namespace: production
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - currency-converter.example.com
      secretName: currency-converter-tls
  rules:
    - host: currency-converter.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: currency-converter-active
                port:
                  name: http

# ------------------------------------------------------------------
# Ingress always routes to the ACTIVE service.
# Argo Rollouts controls WHICH pods the active service selects.
# The Ingress itself never changes — only the service selector does.
#
# Traffic flow:
#   User → Ingress → currency-converter-active → Blue OR Green pods
# ------------------------------------------------------------------
