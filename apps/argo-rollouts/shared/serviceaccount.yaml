apiVersion: v1
kind: ServiceAccount
metadata:
  name: currency-converter-sa
  namespace: production
  labels:
    app.kubernetes.io/name: currency-converter
    app.kubernetes.io/managed-by: argocd
    environment: production
automountServiceAccountToken: false

# ------------------------------------------------------------------
# Why automountServiceAccountToken: false?
# - By default Kubernetes automatically mounts a service account
#   token inside every Pod at:
#   /var/run/secrets/kubernetes.io/serviceaccount/
#
# - That token allows the Pod to communicate with the Kubernetes API.
#
# - Our currency-converter does NOT need Kubernetes API access.
#   It only talks to: PostgreSQL, Redis, and external exchange APIs.
#
# - Disabling it follows the "least privilege" security principle:
#   a compromised Pod cannot use the token to query or modify
#   cluster resources (list pods, read secrets, delete deployments).
#
# If a future sidecar needs API access, re-enable it and create
# a specific Role bound only to the resources it needs.
# ------------------------------------------------------------------
