apiVersion: v1
kind: ServiceAccount

metadata:
  # Name of the ServiceAccount used by the application pods
  name: currency-converter-sa

  # Namespace where this ServiceAccount exists
  namespace: production

  labels:
    # Identifies the application this ServiceAccount belongs to
    app.kubernetes.io/name: currency-converter

    # Indicates that ArgoCD is managing this resource (GitOps)
    app.kubernetes.io/managed-by: argocd

    # Environment classification (production / staging / dev)
    environment: production

  annotations:
    # Ensures this resource is created first in ArgoCD sync order
    argocd.argoproj.io/sync-wave: "0"

# ------------------------------------------------------------------
# Security Configuration
# ------------------------------------------------------------------
# By default Kubernetes automatically mounts a service account token
# inside every Pod using this ServiceAccount.
#
# That token allows the Pod to communicate with the Kubernetes API.
#
# In this case we disable it because:
# - The application does NOT need Kubernetes API access
# - Reduces security risk (least privilege principle)
# - Prevents accidental cluster-level access from the app
#
# If enabled, the token would appear inside:
# /var/run/secrets/kubernetes.io/serviceaccount/
# ------------------------------------------------------------------
automountServiceAccountToken: false