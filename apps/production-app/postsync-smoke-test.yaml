apiVersion: batch/v1
kind: Job
metadata:
  name: smoke-test
  namespace: production
  labels:
    app.kubernetes.io/name: currency-converter
    app.kubernetes.io/component: smoke-test
    app.kubernetes.io/managed-by: argocd
    environment: production
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: currency-converter
        app.kubernetes.io/component: smoke-test
    spec:
      restartPolicy: Never
      serviceAccountName: currency-converter-sa
      initContainers:
        - name: wait-for-deployment
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for deployment to be ready..."
              kubectl rollout status deployment/currency-converter \
                -n production --timeout=180s
              echo "Deployment is ready!"
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      containers:
        - name: smoke-test
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              set -e
              BASE_URL="http://currency-converter-svc.production.svc.cluster.local"
              PASS=0
              FAIL=0

              run_test() {
                local name="$1" url="$2" expected_code="$3" expected_body="$4"
                echo ""
                echo "→ Test: $name"
                RESPONSE=$(curl -s -o /tmp/body -w "%{http_code}" \
                  --max-time 10 --retry 3 --retry-delay 2 "$url")
                BODY=$(cat /tmp/body)
                if [ "$RESPONSE" = "$expected_code" ]; then
                  if [ -n "$expected_body" ] && ! echo "$BODY" | grep -q "$expected_body"; then
                    echo "  ❌ FAIL — body missing: $expected_body"
                    FAIL=$((FAIL + 1))
                  else
                    echo "  ✅ PASS — HTTP $RESPONSE"
                    PASS=$((PASS + 1))
                  fi
                else
                  echo "  ❌ FAIL — expected $expected_code got $RESPONSE"
                  FAIL=$((FAIL + 1))
                fi
              }

              echo "=============================="
              echo " Smoke Tests — $(date -u)"
              echo "=============================="
              run_test "Health Check"    "$BASE_URL/healthz"                                          "200" "ok"
              run_test "Readiness"       "$BASE_URL/readyz"                                           "200" "ready"
              run_test "Home Page"       "$BASE_URL/"                                                 "200" ""
              run_test "API Status"      "$BASE_URL/api/v1/status"                                    "200" "status"
              run_test "Convert USD-EGP" "$BASE_URL/api/v1/convert?from=USD&to=EGP&amount=100"        "200" "result"
              run_test "Rates"           "$BASE_URL/api/v1/rates"                                     "200" "rates"
              run_test "No Admin"        "$BASE_URL/admin"                                            "404" ""
              echo ""
              echo "=============================="
              echo " Results: ✅ $PASS passed | ❌ $FAIL failed"
              echo "=============================="
              [ "$FAIL" -gt "0" ] && exit 1
              echo "All smoke tests passed!"
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
# -------------------------------------------------------------------
# INIT CONTAINER VS MAIN CONTAINER EXPLANATION
# -------------------------------------------------------------------
#
# This Job uses an initContainer to ensure proper separation of concerns:
#
# 1. initContainer (wait-for-deployment):
#    - Runs BEFORE the main container starts.
#    - Its ONLY responsibility is to wait until the target deployment
#      (currency-converter) becomes fully ready.
#    - It blocks the execution of the main container until the application
#      is healthy and fully rolled out.
#
# 2. main container (smoke-test):
#    - Runs ONLY after the initContainer succeeds.
#    - Responsible for executing all smoke tests against the running service.
#
# -------------------------------------------------------------------
# WHY NOT USE A SINGLE CONTAINER?
# -------------------------------------------------------------------
#
# It is technically possible to combine both steps (wait + tests) inside
# a single container script, and it would still work.
#
# However, we intentionally separate them because:
#
# - Clear separation of concerns:
#   wait logic (dependency check) is isolated from test logic (validation).
#
# - Better failure visibility:
#   If the deployment is not ready, the initContainer fails immediately,
#   making it clear that the issue is with readiness, not application logic.
#
# - Better lifecycle control:
#   initContainer MUST succeed before the main container starts,
#   enforcing a strict execution order.
#
# - Cleaner debugging and observability in production environments.
#
# -------------------------------------------------------------------
# WHEN A SINGLE CONTAINER WOULD BE ACCEPTABLE:
# -------------------------------------------------------------------
#
# - Small or local development environments.
# - Simple scripts or temporary testing jobs.
# - Non-production workloads where observability and structure are not critical.
#
# -------------------------------------------------------------------
# PRODUCTION RECOMMENDATION:
# -------------------------------------------------------------------
#
# In production-grade Kubernetes systems, using initContainers is preferred
# to enforce deterministic startup order, improve reliability, and separate
# infrastructure readiness checks from application validation logic.
#
# -------------------------------------------------------------------