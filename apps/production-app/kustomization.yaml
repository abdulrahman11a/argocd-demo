apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - presync-db-migration-job.yaml
  - postsync-smoke-test.yaml
  - syncfail-job.yaml

commonLabels:
  app.kubernetes.io/part-of: currency-converter
  app.kubernetes.io/managed-by: argocd
  environment: production

images:
  - name: abdulrahman11a/currency-converter
    newTag: "IMAGE_TAG"
