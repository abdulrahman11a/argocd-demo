apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: production
  labels:
    app.kubernetes.io/name: currency-converter
    app.kubernetes.io/component: migration
    app.kubernetes.io/managed-by: argocd
    environment: production
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: currency-converter
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: currency-converter-sa
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for database..."
              until nc -z $DB_HOST $DB_PORT; do
                echo "DB not ready — retrying in 5s..."
                sleep 5
              done
              echo "Database is ready!"
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: currency-converter-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: currency-converter-config
                  key: DB_PORT
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
      containers:
        - name: migration
          image: abdulrahman11a/currency-converter:IMAGE_TAG
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              set -e
              echo "=============================="
              echo " DB Migration Starting"
              echo " Time: $(date -u)"
              echo "=============================="
              python manage.py migrate --no-input
              python manage.py migrate --check
              echo "Migration completed successfully!"
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: currency-converter-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: currency-converter-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: currency-converter-config
                  key: DB_NAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: currency-converter-secret
                  key: db-password
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
