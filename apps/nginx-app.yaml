apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/abdulrahman11a/argocd-demo.git
    targetRevision: main
    path: overlays/testing
  destination:
    server: https://kubernetes.default.svc
    namespace: test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  
  syncOptions:
    - CreateNamespace=true
