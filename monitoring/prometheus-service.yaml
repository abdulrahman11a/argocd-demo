apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http

# ------------------------------------------------------------------
# Internal cluster access:
#
#   http://prometheus.monitoring.svc.cluster.local:9090
#
# This exact address is used inside:
#   AnalysisTemplates
#
# Example:
#   provider:
#     prometheus:
#       address: http://prometheus.monitoring.svc.cluster.local:9090
# ------------------------------------------------------------------
