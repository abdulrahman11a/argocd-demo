apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod

        relabel_configs:
          - source_labels:
              [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true

          - source_labels:
              [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)

          - source_labels:
              [__address__,
               __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)

          - source_labels:
              [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace

          - source_labels:
              [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

# ------------------------------------------------------------------
# Prometheus automatically discovers Kubernetes pods.
#
# Pods with:
#   prometheus.io/scrape: "true"
#
# will be scraped automatically.
#
# Your Rollout pods already expose:
#   /metrics on port 9090
#
# This means:
#   currency-converter metrics → Prometheus
#   Prometheus → Grafana dashboards
#   Prometheus → Argo Rollouts AnalysisTemplates
# ------------------------------------------------------------------
